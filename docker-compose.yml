services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: salon
      POSTGRES_PASSWORD: salon
      POSTGRES_DB: salon_whatsapp
    ports:
      - "5432:5432"
    volumes:
      - salon_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - salon_redis:/data

volumes:
  salon_pg:
  salon_redis:
