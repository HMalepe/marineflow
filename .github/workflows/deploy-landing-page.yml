name: Deploy Landing Page

on:
  push:
    branches:
      - master
    paths:
      - "landing-page-solupair-check/**"
      - ".github/workflows/deploy-landing-page.yml"
  workflow_dispatch:

concurrency:
  group: deploy-landing-page
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: landing-page-solupair-check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: landing-page-solupair-check/package-lock.json

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Build
        run: npm run build

      - name: Clear Wrangler deploy metadata
        run: rm -rf .wrangler

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: landing-page-solupair-check/.output/server
          command: deploy --config wrangler.json
